# When changes are pushed to the develop branch,
# build the current version of the API documentation
# with phpDocumentor and deploy it to the api branch.
name: Deploy API Documentation

on:
  push:
    branches:
      - '**'

jobs:

  build:
    name: Deploy to api
    runs-on: ubuntu-latest
    steps:
      - name: Setup credentials
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "${GITHUB_ACTOR}"

      - name: Checkout source
        uses: actions/checkout@v2
        with:
          path: source

      - name: Checkout target
        uses: actions/checkout@v2
        with:
          repository: paulbalandan/api
          token: ${{ secrets.ACCESS_TOKEN }}
          path: api

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4' # v3.0 does not have support for PHP 8.0 yet
          extensions: intl

      - name: Install GraphViz for phpDocumentor
        run: |
          sudo apt install -yq graphviz

      - name: Download phpDocumentor
        run: |
          cd ./source
          curl \
            -L https://github.com/phpDocumentor/phpDocumentor/releases/download/v3.0.0/phpDocumentor.phar \
            -o admin/phpDocumentor.phar

      - name: Prepare
        working-directory: api
        run: |
          rm -rf api/docs*
          mkdir -p api/docs
          git reset --hard master

      - name: Build
        working-directory: source
        run: |
          php admin/phpDocumentor.phar run --ansi --verbose
          cp -R ${GITHUB_WORKSPACE}/source/api/build/* ${GITHUB_WORKSPACE}/api/docs

      - name: Git log
        id: git-log
        run: echo ::set-output name=log::$(git log ${{ github.event.before }}..${{ github.event.after }} --reverse --pretty='%H %s')

      - name: Check Github variables
        run: |
          echo "${{ steps.git-log.outputs.log }}"

      - name: Upload API Documentation
        uses: actions/upload-artifact@v2
        with:
          name: API Documentation
          path: api/docs/
